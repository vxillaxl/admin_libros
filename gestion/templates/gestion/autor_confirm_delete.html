{% extends "gestion/base.html" %}
{% block title %}Eliminar autor{% endblock %}
{% block content %}
<h1 class="h3 mb-3">Eliminar autor</h1>
<div class="card border-danger shadow-sm">
  <div class="card-body">
    <p>¿Desea eliminar a <strong>{{ autor.nombre }}</strong>? Se eliminarán también sus libros asociados.</p>
    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Sí, eliminar</button>
      <a class="btn btn-outline-secondary" href="{% url 'lista_autores' %}">Cancelar</a>
    </form>
  </div>
</div>
{% endblock %}
