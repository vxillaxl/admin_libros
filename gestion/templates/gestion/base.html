{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Gestión de libros{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'gestion/css/estilos.css' %}">
</head>
<body class="app-body">
  <nav class="navbar navbar-expand-lg navbar-dark app-nav sticky-top shadow-sm">
    <div class="container">
      <a class="navbar-brand font-display d-flex align-items-center gap-2 fw-semibold" href="{% url 'home' %}">
        <span class="brand-mark" aria-hidden="true"></span>
        BiblioCatálogo
      </a>
      <button class="navbar-toggler rounded-3 border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navMain" aria-controls="navMain" aria-expanded="false" aria-label="Menú">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMain">
        <ul class="navbar-nav ms-auto gap-lg-1 align-items-lg-center">
          <li class="nav-item"><a class="nav-link px-3 rounded-pill {% if request.resolver_match.url_name == 'home' %}active-nav{% endif %}" href="{% url 'home' %}">Inicio</a></li>
          <li class="nav-item"><a class="nav-link px-3 rounded-pill" href="{% url 'lista_autores' %}">Autores</a></li>
          <li class="nav-item"><a class="nav-link px-3 rounded-pill" href="{% url 'lista_libros' %}">Libros</a></li>
          <li class="nav-item mt-2 mt-lg-0 ms-lg-2">
            <a class="btn btn-sm btn-outline-light rounded-pill px-3" href="{% url 'admin:index' %}">Administración</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-4 py-md-5">
    {% block content %}{% endblock %}
  </main>

  <footer class="app-footer mt-auto py-4">
    <div class="container text-center small font-ui">
      <span class="text-white-50">BiblioCatálogo</span>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{% static 'gestion/js/scripts.js' %}"></script>
</body>
</html>
